<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Studio | JRN STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --border: #334155;
            --secondary-text: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px; 
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0px;
            color: var(--accent);
            font-weight: 400;
            line-height: 1;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 30px;
            color: var(--secondary-text);
            font-weight: 600;
        }

        /* --- Updated Landscape Video Section --- */
        .video-section {
            width: 100%;
            max-width: 600px; /* ডেস্কটপে একটু চওড়া দেখাবে */
            margin-bottom: 10px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Landscape Ratio (16:9) */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .tutorial-hint {
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- Responsive Gallery Grid --- */
        .container {
            display: grid;
            /* অটোমেটিক কলাম তৈরি করবে: মোবাইলে ১টি, ডেস্কটপে ২-৩টি */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px; /* ডেস্কটপে গ্রিডের সর্বোচ্চ চওড়া */
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, border-color 0.3s ease;
            height: fit-content;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
            background-color: #000;
        }

        .info-box {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .title-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--text);
            margin: 0;
            text-transform: uppercase;
        }

        .copy-btn {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .copy-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .copied {
            background: #22c55e !important;
            border-color: #22c55e !important;
            color: white !important;
        }

        #loader { color: var(--secondary-text); margin-bottom: 20px; }

        /* মোবাইল অপ্টিমাইজেশন */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                grid-template-columns: 1fr;
            }
            h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

    <h1>PROMPT STUDIO</h1>
    <h2>BY JRN</h2>

    <div class="video-section">
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/_IFRPijPuVc?rel=0&modestbranding=1" 
                title="Tutorial Video" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
    
    <div class="tutorial-hint">
        Tap "Full Screen" to see the tutorial ↗
    </div>

    <div id="loader">Loading Gallery...</div>

    <div class="container" id="gallery">
        </div>

    <script>
        const sheetID = '15wUCjsVJRv7R8wT4xrd9e3xV5UWhub04suXCfK8lFik';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadData() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                const reversedRows = [...rows].reverse();
                document.getElementById('loader').style.display = 'none';
                
                let html = '';
                reversedRows.forEach((row) => {
                    // ইমেজ ইউআরএল না থাকলে স্কিপ করবে
                    if (!row.c || !row.c[2] || !row.c[2].v || row.c[2].v === "" || row.c[2].v === "ImageURL") return;

                    const title = row.c[0] ? row.c[0].v : 'UNNAMED ART';
                    const promptRaw = row.c[1] ? row.c[1].v : '';
                    const promptEncoded = btoa(unescape(encodeURIComponent(promptRaw)));

                    let img = row.c[2].v;
                    if (img.includes("drive.google.com")) {
                        let fileId = "";
                        if (img.includes("/d/")) fileId = img.split('/d/')[1].split('/')[0];
                        else if (img.includes("id=")) fileId = img.split('id=')[1].split('&')[0];
                        img = `https://lh3.googleusercontent.com/d/${fileId}`;
                    }

                    html += `
                        <div class="card">
                            <img src="${img}" alt="${title}" onerror="this.parentElement.style.display='none'">
                            <div class="info-box">
                                <div class="title-text">${title}</div>
                                <button class="copy-btn" onclick="copyFromBase64(this, '${promptEncoded}')">Get Prompt</button>
                            </div>
                        </div>`;
                });
                
                document.getElementById('gallery').innerHTML = html;
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('loader').innerText = "Failed to load data.";
            }
        }

        function copyFromBase64(button, encodedText) {
            const decodedText = decodeURIComponent(escape(atob(encodedText)));
            const textArea = document.createElement("textarea");
            textArea.value = decodedText;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const originalText = button.innerText;
                button.innerText = "✓ COPIED";
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert("Error copying.");
            }
            document.body.removeChild(textArea);
        }

        loadData();
    </script>
</body>
</html>
