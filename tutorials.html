<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials | JRN STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --border: #334155;
            --sec-text: #94a3b8;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 50px; color: var(--accent); letter-spacing: 5px; margin: 0; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .group-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; border-left: 4px solid var(--accent); padding-left: 15px; margin: 40px 0 20px; letter-spacing: 2px; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .info { padding: 15px; }
        .v-title { font-size: 14px; font-weight: 600; margin: 0; color: var(--text); }
        #loader { text-align: center; margin-top: 50px; color: var(--sec-text); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TUTORIALS HUB</h1>
    </div>

    <div id="loader">FETCHING DATA...</div>
    <div class="container" id="mainContent"></div>

    <script>
    const sheetID = '15wUCjsVJRv7R8wT4xrd9e3xV5UWhub04suXCfK8lFik';
    const gid = '1164964640'; // আপনার ২য় শিটের আইডি
    
    // '&t=' + Date.now() যোগ করা হয়েছে যাতে ব্রাউজার জোর করে নতুন ডেটা লোড করে
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&gid=${gid}&t=${Date.now()}`;

    function getEmbedUrl(raw) {
        if (!raw) return '';
        const ytMatch = raw.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        if (ytMatch && ytMatch[2].length === 11) return `https://www.youtube.com/embed/${ytMatch[2]}`;

        if (raw.includes('drive.google.com')) {
            const driveId = raw.match(/\/d\/(.+?)\//);
            if (driveId && driveId[1]) return `https://drive.google.com/file/d/${driveId[1].split(/[?&]/)[0]}/preview`;
        }
        return raw;
    }

    async function init() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            // গুগল শিটের রেসপন্স থেকে অপ্রয়োজনীয় টেক্সট বাদ দেওয়া
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            const rows = json.table.rows;
            
            const container = document.getElementById('mainContent');
            const groups = {};

            rows.forEach((row, i) => {
                // ১ম রো হেডার হলে সেটি এড়িয়ে চলা
                if (i === 0) return;
                
                // কলাম অনুযায়ী ডাটা রিড করা
                const title = row.c[0] ? row.c[0].v : 'Untitled Video';
                const link = row.c[1] ? row.c[1].v : null;
                const project = row.c[2] ? row.c[2].v : 'OTHERS';

                if (link) {
                    if (!groups[project]) groups[project] = [];
                    groups[project].push({ title, link: getEmbedUrl(link) });
                }
            });

            document.getElementById('loader').style.display = 'none';
            
            let html = '';
            for (const key in groups) {
                html += `<div class="project-section">
                            <div class="section-title">${key}</div>
                            <div class="video-grid">`;
                html += groups[key].map(v => `
                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe src="${v.link}" allowfullscreen></iframe>
                        </div>
                        <div class="info-box"><p class="video-title">${v.title}</p></div>
                    </div>
                `).join('');
                html += `</div></div>`;
            }
            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "ERROR: COULD NOT LOAD TUTORIALS DATA";
        }
    }
    init();
</script>
</body>
</html>
