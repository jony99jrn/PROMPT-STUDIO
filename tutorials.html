<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials | JRN STUDIO</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables for Easy Branding --- */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --border: #334155;
            --secondary-text: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 52px; letter-spacing: 6px; 
            margin-bottom: 0px; color: var(--accent); 
            text-transform: uppercase;
        }

        h2 { 
            font-family: 'Poppins', sans-serif; 
            font-size: 12px; letter-spacing: 8px; 
            margin-bottom: 50px; color: var(--secondary-text); 
            font-weight: 600; 
        }

        /* --- Section Styling (For Project Names) --- */
        .project-section {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 60px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--text);
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Video Grid Layout --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .video-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        /* --- Video Player Container (16:9 Aspect Ratio) --- */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .info-box { padding: 20px; }
        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin: 0;
        }

        #loader { 
            color: var(--secondary-text); 
            margin-top: 100px; 
            font-size: 14px; 
            letter-spacing: 4px; 
            font-weight: 600;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            h1 { font-size: 36px; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>TUTORIALS HUB</h1>
    <h2>BY JRN STUDIO</h2>

    <!-- Loader until data arrives -->
    <div id="loader">INITIALIZING CONTENT...</div>

    <!-- Main dynamic content will load here -->
    <div id="mainContent" style="width: 100%;"></div>

    <script>
        // 1. Google Sheet Connection Details
        const sheetID = '15wUCjsVJRv7R8wT4xrd9e3xV5UWhub04suXCfK8lFik';
        const gid = '1164964640'; // Your specific "Tutorials" Sheet ID
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&gid=${gid}`;

        // 2. Function to Extract Video ID from ANY YouTube link
        function getYoutubeID(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        async function loadData() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                const mainContent = document.getElementById('mainContent');
                const projects = {}; // This will hold grouped videos

                // 3. Process each row
                rows.forEach((row, index) => {
                    // Skip the first row (Header row)
                    if (index === 0) return;

                    // Ensure Column B (Link) exists
                    if (!row.c || !row.c[1] || !row.c[1].v) return;

                    const title = row.c[0] ? row.c[0].v : 'Untitled Tutorial';
                    const videoRaw = row.c[1].v;
                    const videoId = getYoutubeID(videoRaw);
                    const projectName = row.c[2] ? row.c[2].v.toUpperCase() : 'MISC TUTORIALS';

                    // Grouping videos by Project Name (Column C)
                    if (!projects[projectName]) {
                        projects[projectName] = [];
                    }
                    projects[projectName].push({ title, videoId });
                });

                document.getElementById('loader').style.display = 'none';
                
                let finalHTML = '';
                
                // 4. Generate HTML for each Project Section
                for (const sectionName in projects) {
                    finalHTML += `
                        <div class="project-section">
                            <div class="section-title">${sectionName}</div>
                            <div class="video-grid">
                                ${projects[sectionName].map(vid => `
                                    <div class="video-card">
                                        <div class="video-wrapper">
                                            <iframe src="https://www.youtube.com/embed/${vid.videoId}?rel=0&modestbranding=1" allowfullscreen></iframe>
                                        </div>
                                        <div class="info-box">
                                            <div class="video-title">${vid.title}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                mainContent.innerHTML = finalHTML;

            } catch (e) {
                console.error("Data Fetch Error:", e);
                document.getElementById('loader').innerText = "FAILED TO CONNECT TO DATABASE.";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
